<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Huis Dashboard</title>
    <link rel="stylesheet" href="/vendor/gridstack.min.css" />
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/board.css" />
    <link rel="stylesheet" href="/css/popover.css" />
    <link rel="stylesheet" href="/css/views.css" />
    <link rel="stylesheet" href="/css/dock.css" />
    <link rel="stylesheet" href="/css/cmdk.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🏠</text></svg>" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="topbar">
          <div class="brand-lockup">
            <img class="brand-mark" src="/assets/mellowrobot-logo-144.png" alt="" width="72" height="72" />
            <h1 id="title" class="brand-title logo-rainbow">Dashboard</h1>
          </div>
          <select id="ws-select" class="ws-select" title="Switch workspace"></select>
          <div class="topbar-right">
            <button id="undo-btn" class="icon-btn" type="button" title="Undo (Ctrl+Z)">↶</button>
            <button id="redo-btn" class="icon-btn" type="button" title="Redo (Ctrl+Shift+Z)">↷</button>
            <span id="clock" class="clock"></span>
          </div>
        </div>
        <nav id="primary-tabs" class="primary-tabs" aria-label="Primary">
          <button class="primary-tab active" type="button" data-shell-tab="dashboard" aria-current="page">Dashboard</button>
          <button class="primary-tab" type="button" data-shell-tab="chat">Chat</button>
          <button class="primary-tab" type="button" data-shell-tab="models">Models</button>
          <button class="primary-tab" type="button" data-shell-tab="teach">Teach</button>
          <button id="cmdk-pill" class="primary-tab" type="button" data-shell-tab="search" title="Search, act, or ask Dashy (Ctrl+K)" aria-controls="cmdk">Search</button>
        </nav>
      </header>

      <div class="main-row">
        <aside id="workspace-rail" class="workspace-rail" data-pinned="false" aria-label="Workspaces">
          <div class="workspace-rail-panel">
            <div class="workspace-rail-head">
              <span class="workspace-rail-title">Workspaces</span>
              <button id="workspace-rail-pin" class="workspace-rail-pin" type="button" title="Pin workspace rail" aria-label="Pin workspace rail" aria-pressed="false">📌</button>
            </div>
            <nav id="ws-tabs" class="ws-tabs"></nav>
          </div>
        </aside>
        <main class="board-wrap">
          <section id="view-board" class="view">
            <canvas id="workspace-bg" class="workspace-bg" aria-hidden="true"></canvas>
            <div id="board" class="grid-stack"></div>
            <div id="empty-hero" class="empty-hero hidden">
              <div class="empty-hero-icon">✦</div>
              <p>This workspace is empty.</p>
              <p class="empty-hero-sub">Add a section from <kbd>⌘K</kbd>, or ask Dashy to set it up.</p>
              <div class="prompt-chips">
                <button class="prompt-chip" type="button">Set up a starter layout for this workspace</button>
                <button class="prompt-chip" type="button">Add a section for my media apps</button>
                <button class="prompt-chip" type="button">Add a sticky note for today's tasks</button>
              </div>
            </div>
          </section>
          <section id="view-models" class="view sys-view hidden"></section>
          <section id="view-abilities" class="view sys-view hidden"></section>
          <section id="view-requests" class="view sys-view hidden">
            <div class="fr-wrap">
              <form id="fr-form" class="fr-form">
                <input id="fr-title" type="text" placeholder="Request a feature…" autocomplete="off" />
                <textarea id="fr-detail" rows="1" placeholder="Details (optional)"></textarea>
                <button type="submit" class="primary-btn">Add request</button>
              </form>
              <div id="fr-list" class="fr-list"></div>
            </div>
          </section>
          <section id="view-problems" class="view sys-view hidden">
            <div class="fr-wrap">
              <form id="pb-form" class="fr-form">
                <input id="pb-title" type="text" placeholder="Report a problem…" autocomplete="off" />
                <textarea id="pb-detail" rows="1" placeholder="What happened? (optional)"></textarea>
                <button type="submit" class="primary-btn">Report</button>
              </form>
              <div id="pb-list" class="fr-list"></div>
            </div>
          </section>
          <section id="view-logs" class="view sys-view hidden"></section>
          <section id="view-replay" class="view sys-view hidden"></section>
          <section id="view-prompts" class="view sys-view hidden"></section>
        </main>

        <aside id="dock" class="dock" data-state="rail">
          <div class="dock-rail">
            <button id="dock-expand" class="dock-rail-action dock-ai-action" type="button" title="Open Dashy (Ctrl+J)">
              <span class="rail-icon">✦</span>
              <span class="rail-label">Dashy</span>
            </button>
            <button id="dock-rail-pin" class="dock-rail-action dock-pin-action" type="button" title="Pin rail" aria-label="Pin rail" aria-pressed="false">
              <span class="rail-icon">📌</span>
              <span class="rail-label">Pin rail</span>
            </button>
            <div id="overflow-menu" class="dock-rail-sections">
              <div class="rail-section-label">Layout</div>
              <button id="collapse-all" class="dock-rail-action" type="button" title="Collapse or expand all sections">
                <span class="rail-icon">⊟</span>
                <span class="rail-label">Collapse all</span>
              </button>
              <button id="snap-toggle" class="dock-rail-action" type="button" title="Show grid guides (cards always snap)">
                <span class="rail-icon">⊞</span>
                <span class="rail-label">Grid: off</span>
              </button>
              <button id="arrange-toggle" class="dock-rail-action" type="button" title="Auto-arrange: compact cards up to fill gaps">
                <span class="rail-icon">🧲</span>
                <span class="rail-label">Arrange: on</span>
              </button>
              <button id="edit-toggle" class="dock-rail-action" type="button" title="Lock / unlock the layout">
                <span class="rail-icon">🔓</span>
                <span class="rail-label">Edit</span>
              </button>
              <div class="dock-rail-row dock-grid-row" title="Grid size">
                <span class="rail-icon">↕</span>
                <span class="rail-label">Grid size</span>
                <span class="rail-stepper">
                  <button id="grid-smaller" type="button" title="Smaller cells">−</button>
                  <span id="grid-size-val">92</span>
                  <button id="grid-bigger" type="button" title="Bigger cells">+</button>
                </span>
              </div>
              <div class="rail-section-label">System</div>
              <button class="dock-rail-action" type="button" data-view="models">
                <span class="rail-icon">🧪</span>
                <span class="rail-label">Models</span>
              </button>
              <button class="dock-rail-action" type="button" data-view="abilities">
                <span class="rail-icon">🛠️</span>
                <span class="rail-label">Abilities</span>
              </button>
              <button class="dock-rail-action" type="button" data-view="requests">
                <span class="rail-icon">🗒️</span>
                <span class="rail-label">Requests</span>
                <span id="fr-count" class="menu-count hidden"></span>
              </button>
              <button class="dock-rail-action" type="button" data-view="problems">
                <span class="rail-icon">🚨</span>
                <span class="rail-label">Problems</span>
                <span id="pb-count" class="menu-count hidden"></span>
              </button>
              <button class="dock-rail-action" type="button" data-view="logs">
                <span class="rail-icon">🧾</span>
                <span class="rail-label">Logs</span>
              </button>
              <button class="dock-rail-action" type="button" data-view="replay">
                <span class="rail-icon">🎬</span>
                <span class="rail-label">Replay</span>
              </button>
              <button class="dock-rail-action" type="button" data-view="prompts">
                <span class="rail-icon">📜</span>
                <span class="rail-label">Prompts</span>
              </button>
            </div>
            <span id="dock-activity" class="dock-activity hidden"></span>
          </div>
          <div class="dock-panel">
            <div id="dock-resizer" class="dock-resizer" title="Drag to resize"></div>
            <header class="dock-head">
              <span class="dock-avatar">✦</span>
              <div class="dock-id">
                <div class="dock-title">Dashy</div>
                <div class="model-picker">
                  <button id="model-btn" class="model-btn" type="button"><span id="model-btn-label">…</span><span class="caret">▾</span></button>
                  <div id="model-menu" class="model-menu hidden"></div>
                </div>
              </div>
              <button id="dock-new" class="icon-btn" type="button" title="New conversation">✚</button>
              <button id="dock-float" class="icon-btn" type="button" title="Pop out as a floating window">⧉</button>
              <button id="dock-collapse" class="icon-btn" type="button" title="Collapse (Ctrl+J)">⇥</button>
            </header>
            <div id="dock-log" class="dock-log"></div>
            <form id="dock-form" class="dock-bar">
              <div id="dock-bar-resizer" class="dock-bar-resizer" title="Drag to resize"></div>
              <div id="dock-attachments" class="attachments hidden"></div>
              <div class="dock-bar-row">
                <div class="composer-tools">
                  <button id="dock-voice" class="composer-tool voice-btn" type="button" title="Record voice input" aria-label="Record voice input">◉</button>
                  <button id="dock-copy" class="composer-tool" type="button" title="Copy composer text" aria-label="Copy composer text">⧉</button>
                  <button id="dock-paste" class="composer-tool" type="button" title="Paste clipboard text" aria-label="Paste clipboard text">⎘</button>
                  <button id="dock-clear" class="composer-tool danger" type="button" title="Clear composer" aria-label="Clear composer">⌫</button>
                </div>
                <textarea id="dock-input" rows="2" placeholder="Ask Dashy…" title="Enter to send · Shift+Enter for a newline" autocomplete="off"></textarea>
                <button type="submit" title="Send">↵</button>
              </div>
            </form>
          </div>
        </aside>
      </div>
    </div>

    <div id="cmdk" class="cmdk-backdrop hidden">
      <div class="cmdk-panel">
        <div class="cmdk-input-row" title="Drag to move">
          <span class="cmdk-grip">⠿</span>
          <span class="cmdk-icon">⌕</span>
          <input id="cmdk-input" type="text" placeholder="Search, act, or ask Dashy…" autocomplete="off" />
          <button id="cmdk-esc" class="cmdk-esc" type="button" title="Close (Esc)">esc</button>
        </div>
        <div id="cmdk-results" class="cmdk-results"></div>
      </div>
    </div>

    <div id="toasts" class="toasts"></div>

    <script src="/vendor/gridstack-all.js"></script>
    <script src="/js/main.js" type="module"></script>
  </body>
</html>
