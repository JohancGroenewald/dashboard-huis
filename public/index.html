<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Huis Dashboard</title>
    <link rel="stylesheet" href="/vendor/gridstack.min.css" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🏠</text></svg>" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <h1 id="title">Dashboard</h1>
        <nav id="ws-tabs" class="ws-tabs"></nav>
      </div>
      <div class="topbar-right">
        <button id="undo-btn" class="ghost-btn dashboard-only" title="Undo (Ctrl+Z)">↶</button>
        <button id="redo-btn" class="ghost-btn dashboard-only" title="Redo (Ctrl+Shift+Z)">↷</button>
        <span id="clock" class="clock"></span>
        <button id="section-add" class="ghost-btn dashboard-only" title="Add a section">＋ Section</button>
        <button id="note-add" class="ghost-btn dashboard-only" title="Add a sticky note">📝 Note</button>
        <div class="dropdown dashboard-only">
          <button id="hidden-toggle" class="ghost-btn hidden" title="Hidden notes">🙈 Hidden 0</button>
          <div id="hidden-menu" class="dropdown-menu hidden"></div>
        </div>
        <button id="arrange-toggle" class="ghost-btn dashboard-only" title="Auto-arrange: compact cards up to fill gaps">🧲 Arrange: on</button>
        <button id="edit-toggle" class="ghost-btn dashboard-only" title="Lock / unlock the layout">🔓 Edit</button>
        <div class="dropdown">
          <button id="abilities-toggle" class="ghost-btn" title="What the assistant can do">🛠️ Abilities ▾</button>
          <div id="abilities-menu" class="dropdown-menu hidden"></div>
        </div>
        <div class="dropdown">
          <button id="logs-toggle" class="ghost-btn" title="Conversation log">🧾 Logs ▾</button>
          <div id="logs-menu" class="dropdown-menu hidden"></div>
        </div>
        <button id="fr-toggle" class="ghost-btn" title="Feature requests">🗒️ Requests<span id="fr-count" class="badge hidden">0</span></button>
        <button id="chat-toggle" class="chat-toggle" title="Open assistant">💬 Assistant</button>
      </div>
    </header>

    <main class="board-wrap">
      <section id="ws-dashboard" class="workspace">
        <div id="board" class="grid-stack"></div>
        <p id="empty-hint" class="empty-hint hidden">Nothing here yet — add a tile, a note, or ask the assistant.</p>
      </section>
      <section id="ws-models" class="workspace hidden"></section>
    </main>

    <!-- Feature request queue -->
    <aside id="fr-panel" class="side-panel left hidden">
      <div class="side-head">
        <strong>Feature requests</strong>
        <button id="fr-close" class="icon-btn" title="Close">✕</button>
      </div>
      <form id="fr-form" class="fr-form">
        <input id="fr-title" type="text" placeholder="Request a feature…" autocomplete="off" />
        <textarea id="fr-detail" rows="2" placeholder="Details (optional)"></textarea>
        <button type="submit">Add request</button>
      </form>
      <div id="fr-list" class="fr-list"></div>
    </aside>

    <!-- Assistant -->
    <aside id="chat" class="side-panel right assistant hidden">
      <header class="asst-head">
        <span class="asst-avatar">🤖</span>
        <div class="asst-id">
          <div class="asst-title">Assistant</div>
          <div class="model-picker">
            <button id="model-btn" class="model-btn" type="button"><span id="model-btn-label">…</span><span class="caret">▾</span></button>
            <div id="model-menu" class="model-menu hidden"></div>
          </div>
        </div>
        <button id="chat-new" class="icon-btn" title="New conversation">✚</button>
        <button id="chat-close" class="icon-btn" title="Close">✕</button>
      </header>
      <div id="chat-log" class="chat-log">
        <div class="intro">
          <div class="intro-avatar">🤖</div>
          <p>I can add, edit, move, group, or remove tiles, sections and notes — just ask. If I can't do something, I'll file a feature request.</p>
          <div class="suggestions">
            <button class="suggestion" type="button">Add a Grafana tile to a new Monitoring section</button>
            <button class="suggestion" type="button">Add a sticky note to call the plumber</button>
            <button class="suggestion" type="button">Group my media apps into a Media section</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Assistant input — centered bottom bar -->
    <form id="chat-form" class="chat-bar">
      <div id="chat-attachments" class="attachments hidden"></div>
      <div class="chat-bar-row">
        <textarea id="chat-input" rows="2" placeholder="Ask the assistant to change the dashboard…" title="Enter to send · Shift+Enter for a newline" autocomplete="off"></textarea>
        <button type="submit" title="Send">Send</button>
      </div>
    </form>

    <script src="/vendor/gridstack-all.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
